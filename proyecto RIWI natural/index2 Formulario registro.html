<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>

<form id="Registro_formulario" class="formulario">
    <h4>Iniciar sesión</h4>

    <ul class="lista">
        
        <div class="grupo">
            <p class="Nombres_arriba">Nombre</p>
            <li class="controles">
                <input required type="text" placeholder="Ingresa tu nombre">
            </li>
        </div>

        <div class="grupo">
            <p class="Nombres_arriba">Apellido</p>
            <li class="controles">
                <input required type="text" placeholder="Ingresa tu apellido">
            </li>
        </div>

        <div class="grupo">
            <p class="Nombres_arriba">Gmail</p>
            <li class="controles">
                <input required type="email" placeholder="Ingresa tu Gmail">
            </li>
        </div>

        <div class="grupo">
            <p class="Nombres_arriba">Contraseña</p>
            <li class="controles">
                <input required type="password" placeholder="Ingresa tu contraseña">
            </li>
        </div>

    </ul>

    <p id="Texto_final">
        <input required type="checkbox">
        Estoy de acuerdo con <a href="#">Términos y condiciones</a>
    </p>

    <div class="botones">
       <a href="index3.html" class="boton">Registrar</a>
        <input type="reset" value="Limpiar">
    </div>

    <p id="Resultado"></p>
</form>
</body>
</html>
